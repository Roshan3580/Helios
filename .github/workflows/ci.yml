name: CI

on:
  push:
  pull_request:

jobs:
  frontend:
    name: Frontend (typecheck, lint, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run typecheck
      - name: Lint
        run: bun run lint
      - name: Build
        run: bun run build

  backend-tests:
    name: Backend tests (Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: helios_test
          POSTGRES_PASSWORD: helios_test
          POSTGRES_DB: helios_test
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U helios_test -d helios_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      HELIOS_TEST_DATABASE_URL: postgresql://helios_test:helios_test@localhost:5434/helios_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements*.txt
      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements-dev.txt
      - name: Run tests (applies Alembic migrations to the test database)
        working-directory: backend
        run: pytest -v

  sdk-tests:
    name: Python SDK tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: sdk/python/pyproject.toml
      - name: Install SDK with test dependencies
        working-directory: sdk/python
        run: pip install -e ".[dev]"
      - name: Run tests
        working-directory: sdk/python
        run: pytest -v
