name: CI

on:
  push:
  pull_request:

jobs:
  frontend:
    name: Frontend (typecheck, lint, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run typecheck
      - name: Lint
        run: bun run lint
      - name: Build
        run: bun run build

  backend-tests:
    name: Backend tests (Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: helios_test
          POSTGRES_PASSWORD: helios_test
          POSTGRES_DB: helios_test
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U helios_test -d helios_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      HELIOS_TEST_DATABASE_URL: postgresql://helios_test:helios_test@localhost:5434/helios_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements*.txt
      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements-dev.txt
      - name: Install SDK (for the end-to-end OTLP export test)
        # The e2e test (backend/tests/test_sdk_e2e.py) runs in this Postgres job
        # rather than a separate job, reusing the DB service and migrations.
        run: pip install -e "sdk/python[otel,openai]"
      - name: Run tests (applies Alembic migrations to the test database)
        working-directory: backend
        run: pytest -v

  sdk-tests:
    name: Python SDK tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: sdk/python/pyproject.toml
      - name: Install SDK with test dependencies
        working-directory: sdk/python
        run: pip install -e ".[dev]"
      - name: Run tests
        working-directory: sdk/python
        run: pytest -v

  browser-e2e:
    name: Browser E2E (Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements*.txt
            sdk/python/pyproject.toml
      - name: Install frontend dependencies
        run: bun install --frozen-lockfile
      - name: Install Playwright Chromium
        run: bunx playwright install chromium --with-deps
      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements-dev.txt
          .venv/bin/pip install -e "../sdk/python[otel]"
      - name: Run browser E2E harness
        env:
          CI: "true"
          BACKEND_VENV: ${{ github.workspace }}/backend/.venv
        run: bash scripts/run-e2e.sh
      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-artifacts
          path: |
            playwright-report/
            test-results/
          retention-days: 7
